<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangle EFGH avec points K et L -->

  <!-- Rectangle EFGH : EF = 126, FG = 168 -->
  <!-- E en bas à gauche, F en bas à droite, G en haut à droite, H en haut à gauche -->

  <!-- Point E -->
  <circle cx="60" cy="320" r="4" fill="black"/>
  <text x="40" y="340" font-size="16" font-weight="bold">E</text>

  <!-- Point F -->
  <circle cx="312" cy="320" r="4" fill="black"/>
  <text x="317" y="340" font-size="16" font-weight="bold">F</text>

  <!-- Point G -->
  <circle cx="312" cy="84" r="4" fill="black"/>
  <text x="317" y="79" font-size="16" font-weight="bold">G</text>

  <!-- Point H -->
  <circle cx="60" cy="84" r="4" fill="black"/>
  <text x="40" y="79" font-size="16" font-weight="bold">H</text>

  <!-- Rectangle EFGH -->
  <rect x="60" y="84" width="252" height="236" fill="lightblue" fill-opacity="0.2" stroke="black" stroke-width="2.5"/>

  <!-- Point K sur [EF] avec EK = 54 -->
  <!-- EK/EF = 54/126 = 3/7 -->
  <!-- x_K = 60 + (252 * 54/126) = 60 + 108 = 168 -->
  <circle cx="168" cy="320" r="4" fill="red"/>
  <text x="162" y="340" font-size="16" font-weight="bold" fill="red">K</text>

  <!-- Point L sur [GH] avec GL = 72 -->
  <!-- GL/GH = 72/126 = 4/7 -->
  <!-- x_L = 312 - (252 * 72/126) = 312 - 144 = 168 -->
  <circle cx="168" cy="84" r="4" fill="blue"/>
  <text x="162" y="74" font-size="16" font-weight="bold" fill="blue">L</text>

  <!-- Segment KL (perpendiculaire à EF) -->
  <line x1="168" y1="320" x2="168" y2="84" stroke="green" stroke-width="2.5"/>

  <!-- Diagonale EG -->
  <line x1="60" y1="320" x2="312" y2="84" stroke="purple" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Dimensions -->
  <text x="170" y="340" font-size="12" fill="black">EF = 126 mm</text>
  <text x="320" y="210" font-size="12" fill="black">FG = 168 mm</text>
  <text x="100" y="335" font-size="11" fill="red">EK = 54 mm</text>
  <text x="230" y="74" font-size="11" fill="blue">GL = 72 mm</text>
  <text x="175" y="200" font-size="11" fill="green">KL ⊥ EF</text>
  <text x="160" y="180" font-size="11" fill="purple">EG = ?</text>

  <!-- Angles droits -->
  <rect x="60" y="308" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="300" y="308" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="300" y="84" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="60" y="84" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="168" y="308" width="12" height="12" fill="none" stroke="green" stroke-width="1"/>

  <!-- Note -->
  <text x="370" y="360" font-size="10" fill="gray">Figure non</text>
  <text x="370" y="375" font-size="10" fill="gray">à l'échelle</text>
</svg>
