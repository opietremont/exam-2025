<svg width="520" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle MNP rectangle en N avec point Q et parallèle -->

  <!-- Triangle MNP : MN = 84, NP = 112, MP = 140 -->
  <!-- Rectangle en N -->

  <!-- Point M -->
  <circle cx="70" cy="300" r="5" fill="black"/>
  <text x="50" y="320" font-size="18" font-weight="bold">M</text>

  <!-- Point N -->
  <circle cx="238" cy="300" r="5" fill="black"/>
  <text x="243" y="320" font-size="18" font-weight="bold">N</text>

  <!-- Point P -->
  <circle cx="238" cy="76" r="5" fill="black"/>
  <text x="243" y="71" font-size="18" font-weight="bold">P</text>

  <!-- Triangle MNP -->
  <polygon points="70,300 238,300 238,76" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Angle droit en N -->
  <rect x="226" y="288" width="12" height="12" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Point Q sur [MN] avec MQ = 36 -->
  <!-- MQ/MN = 36/84 = 3/7 -->
  <!-- x_Q = 70 + (168 * 36/84) = 70 + 72 = 142 -->
  <circle cx="142" cy="300" r="4" fill="red"/>
  <text x="135" y="320" font-size="16" font-weight="bold" fill="red">Q</text>

  <!-- Point R sur [MP] tel que (QR) // (NP) -->
  <!-- Par Thalès : MR/MP = MQ/MN = 3/7 -->
  <!-- Direction MP : (168, -224) -->
  <!-- MR = (3/7) × MP, donc R = M + (3/7)(168, -224) = (70 + 72, 300 - 96) = (142, 204) -->
  <circle cx="142" cy="204" r="4" fill="blue"/>
  <text x="125" y="199" font-size="16" font-weight="bold" fill="blue">R</text>

  <!-- Segment QR (parallèle à NP) -->
  <line x1="142" y1="300" x2="142" y2="204" stroke="green" stroke-width="2.5"/>

  <!-- Segment NP -->
  <line x1="238" y1="300" x2="238" y2="76" stroke="purple" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Marques de parallélisme -->
  <line x1="142" y1="260" x2="154" y2="260" stroke="darkgreen" stroke-width="2"/>
  <line x1="238" y1="200" x2="250" y2="200" stroke="darkgreen" stroke-width="2"/>

  <!-- Dimensions -->
  <text x="140" y="320" font-size="12" fill="black">MN = 84 mm</text>
  <text x="250" y="200" font-size="12" fill="black">NP = 112 mm</text>
  <text x="130" y="165" font-size="12" fill="black">MP = 140 mm</text>

  <text x="95" y="315" font-size="11" fill="red">MQ = 36 mm</text>
  <text x="110" y="250" font-size="11" fill="blue">MR = ?</text>
  <text x="115" y="280" font-size="11" fill="green">QR = ?</text>
  <text x="150" y="260" font-size="10" fill="green">(QR) // (NP)</text>

  <!-- Triangle MQR -->
  <polygon points="70,300 142,300 142,204" fill="lightyellow" fill-opacity="0.3" stroke="orange" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Note -->
  <text x="300" y="320" font-size="10" fill="gray">Figure non à l'échelle</text>
  <text x="300" y="335" font-size="10" fill="gray">Triangle bleu: MNP</text>
  <text x="300" y="350" font-size="10" fill="gray">Triangle jaune: MQR</text>
  <text x="300" y="365" font-size="10" fill="gray">Rectangle en N</text>
  <text x="300" y="380" font-size="10" fill="gray">(QR) // (NP)</text>
</svg>
