<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle ABC avec hauteur AD -->

  <!-- Point A (en haut) -->
  <circle cx="200" cy="80" r="5" fill="black"/>
  <text x="185" y="70" font-size="18" font-weight="bold">A</text>

  <!-- Point B (en bas à gauche) -->
  <circle cx="80" cy="320" r="5" fill="black"/>
  <text x="60" y="340" font-size="18" font-weight="bold">B</text>

  <!-- Point C (en bas à droite) -->
  <circle cx="420" cy="320" r="5" fill="black"/>
  <text x="430" y="340" font-size="18" font-weight="bold">C</text>

  <!-- Triangle ABC -->
  <polygon points="200,80 80,320 420,320" fill="lightblue" fill-opacity="0.2" stroke="black" stroke-width="2.5"/>

  <!-- Point D sur [BC] (pied de la hauteur) -->
  <!-- D est le projeté orthogonal de A sur (BC) -->
  <!-- BC est horizontal (y = 320), donc D est à x = 200 -->
  <circle cx="200" cy="320" r="5" fill="red"/>
  <text x="205" y="340" font-size="18" font-weight="bold" fill="red">D</text>

  <!-- Hauteur AD -->
  <line x1="200" y1="80" x2="200" y2="320" stroke="green" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Angle droit en D -->
  <rect x="188" y="308" width="12" height="12" fill="none" stroke="green" stroke-width="1.5"/>

  <!-- Angles -->
  <!-- Angle BAD = 52° -->
  <path d="M 180 95 A 25 25 0 0 0 165 110" fill="none" stroke="purple" stroke-width="2"/>
  <text x="160" y="110" font-size="14" fill="purple" font-weight="bold">52°</text>

  <!-- Angle ACB = 68° -->
  <path d="M 400 320 A 25 25 0 0 1 395 300" fill="none" stroke="blue" stroke-width="2"/>
  <text x="375" y="305" font-size="14" fill="blue" font-weight="bold">68°</text>

  <!-- Angle ADB = 90° -->
  <text x="210" y="300" font-size="14" fill="green" font-weight="bold">90°</text>

  <!-- Labels des segments -->
  <text x="130" y="190" font-size="13" fill="black">AB</text>
  <text x="300" y="190" font-size="13" fill="black">AC</text>
  <text x="240" y="330" font-size="13" fill="black">BC</text>
  <text x="180" y="210" font-size="13" fill="green">AD (hauteur)</text>

  <!-- Note -->
  <text x="150" y="380" font-size="11" fill="gray">Figure non à l'échelle</text>
  <text x="150" y="395" font-size="11" fill="gray">(AD) est la hauteur issue de A</text>
</svg>
