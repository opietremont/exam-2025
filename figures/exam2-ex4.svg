<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Tableau des notes de statistiques -->

  <!-- Titre -->
  <text x="150" y="30" font-size="18" font-weight="bold" fill="black">Notes obtenues par les 26 élèves</text>

  <!-- Tableau -->
  <!-- En-tête -->
  <rect x="50" y="50" width="120" height="40" fill="lightblue" stroke="black" stroke-width="2"/>
  <rect x="170" y="50" width="400" height="40" fill="lightblue" stroke="black" stroke-width="2"/>

  <text x="90" y="75" font-size="14" font-weight="bold">Note</text>
  <text x="320" y="75" font-size="14" font-weight="bold">Effectif</text>

  <!-- Ligne 1 : Note 7 -->
  <rect x="50" y="90" width="120" height="30" fill="white" stroke="black" stroke-width="1"/>
  <rect x="170" y="90" width="400" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="105" y="110" font-size="13" text-anchor="middle">7</text>
  <text x="370" y="110" font-size="13" text-anchor="middle">1</text>

  <!-- Ligne 2 : Note 8 -->
  <rect x="50" y="120" width="120" height="30" fill="white" stroke="black" stroke-width="1"/>
  <rect x="170" y="120" width="400" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="105" y="140" font-size="13" text-anchor="middle">8</text>
  <text x="370" y="140" font-size="13" text-anchor="middle">2</text>

  <!-- Ligne 3 : Note 9 -->
  <rect x="50" y="150" width="120" height="30" fill="white" stroke="black" stroke-width="1"/>
  <rect x="170" y="150" width="400" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="105" y="170" font-size="13" text-anchor="middle">9</text>
  <text x="370" y="170" font-size="13" text-anchor="middle">1</text>

  <!-- Ligne 4 : Note 10 -->
  <rect x="50" y="180" width="120" height="30" fill="white" stroke="black" stroke-width="1"/>
  <rect x="170" y="180" width="400" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="105" y="200" font-size="13" text-anchor="middle">10</text>
  <text x="370" y="200" font-size="13" text-anchor="middle">2</text>

  <!-- Ligne 5 : Note 11 -->
  <rect x="50" y="210" width="120" height="30" fill="white" stroke="black" stroke-width="1"/>
  <rect x="170" y="210" width="400" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="105" y="230" font-size="13" text-anchor="middle">11</text>
  <text x="370" y="230" font-size="13" text-anchor="middle">2</text>

  <!-- Données supplémentaires à droite -->
  <text x="220" y="110" font-size="12">Note 12 : 3 élèves</text>
  <text x="220" y="140" font-size="12">Note 13 : 2 élèves</text>
  <text x="220" y="170" font-size="12">Note 14 : 3 élèves</text>
  <text x="220" y="200" font-size="12">Note 15 : 2 élèves</text>
  <text x="220" y="230" font-size="12">Note 16 : 2 élèves</text>

  <text x="400" y="110" font-size="12">Note 17 : 2 élèves</text>
  <text x="400" y="140" font-size="12">Note 18 : 2 élèves</text>
  <text x="400" y="170" font-size="12">Note 19 : 1 élève</text>
  <text x="400" y="200" font-size="12">Note 20 : 1 élève</text>

  <!-- Total -->
  <rect x="50" y="240" width="120" height="30" fill="lightgray" stroke="black" stroke-width="2"/>
  <rect x="170" y="240" width="400" height="30" fill="lightgray" stroke="black" stroke-width="2"/>
  <text x="90" y="260" font-size="14" font-weight="bold">TOTAL</text>
  <text x="370" y="260" font-size="14" font-weight="bold" text-anchor="middle">26 élèves</text>
</svg>
