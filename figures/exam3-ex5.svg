<svg width="450" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Cercle avec arc AB -->

  <!-- Cercle de rayon 52 mm (représenté avec 130 pixels) -->
  <circle cx="225" cy="210" r="130" fill="lightblue" fill-opacity="0.2" stroke="black" stroke-width="2.5"/>

  <!-- Centre O -->
  <circle cx="225" cy="210" r="5" fill="red"/>
  <text x="210" y="205" font-size="16" font-weight="bold" fill="red">O</text>

  <!-- Rayon -->
  <line x1="225" y1="210" x2="355" y2="210" stroke="blue" stroke-width="2"/>
  <text x="280" y="200" font-size="14" fill="blue" font-weight="bold">r = 52 mm</text>

  <!-- Arc AB avec angle au centre de 117° -->
  <!-- Point A : angle 0° (à droite) -->
  <circle cx="355" cy="210" r="5" fill="darkgreen"/>
  <text x="365" y="215" font-size="16" font-weight="bold" fill="darkgreen">A</text>

  <!-- Point B : angle 117° (sens antihoraire) -->
  <!-- B = O + r(cos(117°), sin(117°)) -->
  <!-- B = (225, 210) + 130(cos(117°), -sin(117°)) car y vers le bas -->
  <!-- cos(117°) ≈ -0.454, sin(117°) ≈ 0.891 -->
  <!-- B ≈ (225 - 59, 210 - 116) = (166, 94) -->
  <circle cx="166" cy="94" r="5" fill="darkgreen"/>
  <text x="145" y="90" font-size="16" font-weight="bold" fill="darkgreen">B</text>

  <!-- Rayon OA -->
  <line x1="225" y1="210" x2="355" y2="210" stroke="darkgreen" stroke-width="2"/>

  <!-- Rayon OB -->
  <line x1="225" y1="210" x2="166" y2="94" stroke="darkgreen" stroke-width="2"/>

  <!-- Arc AB (tracé avec path) -->
  <path d="M 355 210 A 130 130 0 0 0 166 94" fill="none" stroke="orange" stroke-width="3"/>

  <!-- Angle au centre -->
  <path d="M 255 210 A 30 30 0 0 0 243 190" fill="none" stroke="purple" stroke-width="2"/>
  <text x="260" y="195" font-size="14" fill="purple" font-weight="bold">117°</text>

  <!-- Légende -->
  <text x="100" y="370" font-size="13" fill="black" font-weight="bold">Cercle de centre O et de rayon 52 mm</text>
  <text x="100" y="390" font-size="13" fill="orange" font-weight="bold">Arc AB avec angle au centre AOB = 117°</text>
  <text x="100" y="410" font-size="11" fill="gray">Figure non à l'échelle</text>
</svg>
