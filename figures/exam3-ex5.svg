<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Configuration de Thalès avec (MN) // (PQ) -->

  <!-- Point O (origine) -->
  <circle cx="80" cy="100" r="5" fill="black"/>

  <!-- Première droite : O, M, P alignés (direction vers le bas et légèrement à droite) -->
  <line x1="80" y1="100" x2="180" y2="340" stroke="black" stroke-width="2"/>

  <!-- Deuxième droite : O, N, Q alignés (direction vers la droite et en bas) -->
  <line x1="80" y1="100" x2="420" y2="280" stroke="black" stroke-width="2"/>

  <!-- Point M sur la première droite (OM = 52) -->
  <circle cx="120" cy="185" r="4" fill="red"/>

  <!-- Point P sur la première droite (OP = 117, soit environ 2.25 fois OM) -->
  <circle cx="165" cy="285" r="4" fill="red"/>

  <!-- Point N sur la deuxième droite (ON = 39) -->
  <circle cx="190" cy="155" r="4" fill="blue"/>

  <!-- Point Q sur la deuxième droite (OQ = 87.75, soit environ 2.25 fois ON) -->
  <circle cx="310" cy="215" r="4" fill="blue"/>

  <!-- Segment MN -->
  <line x1="120" y1="185" x2="190" y2="155" stroke="green" stroke-width="2.5"/>

  <!-- Segment PQ (parallèle à MN, en pointillés) -->
  <line x1="165" y1="285" x2="310" y2="215" stroke="purple" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Labels des points -->
  <text x="65" y="95" font-size="18" font-weight="bold">O</text>
  <text x="100" y="190" font-size="16" font-weight="bold" fill="red">M</text>
  <text x="145" y="295" font-size="16" font-weight="bold" fill="red">P</text>
  <text x="195" y="145" font-size="16" font-weight="bold" fill="blue">N</text>
  <text x="320" y="210" font-size="16" font-weight="bold" fill="blue">Q</text>

  <!-- Dimensions -->
  <text x="75" y="145" font-size="13" fill="red">OM = 52 mm</text>
  <text x="90" y="245" font-size="13" fill="red">OP = 117 mm</text>
  <text x="120" y="125" font-size="13" fill="blue">ON = 39 mm</text>
  <text x="140" y="165" font-size="13" fill="green">MN = 64 mm</text>
  <text x="220" y="265" font-size="13" fill="purple">PQ = ?</text>
  <text x="230" y="190" font-size="13" fill="blue">OQ = ?</text>

  <!-- Indication de parallélisme -->
  <text x="200" y="235" font-size="14" fill="green" font-weight="bold">(MN) // (PQ)</text>

  <!-- Note -->
  <text x="160" y="370" font-size="13" fill="gray" font-style="italic">Figure non à l'échelle</text>
</svg>