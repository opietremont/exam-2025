<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangle ABCD -->
  <rect x="50" y="100" width="380" height="240" fill="none" stroke="black" stroke-width="2"/>

  <!-- Point E sur [AB] -->
  <circle cx="185" cy="100" r="3" fill="red"/>

  <!-- Point F sur [BC] -->
  <circle cx="430" cy="292" r="3" fill="blue"/>

  <!-- Segments EC et EF -->
  <line x1="185" y1="100" x2="430" y2="340" stroke="green" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="185" y1="100" x2="430" y2="292" stroke="purple" stroke-width="2"/>

  <!-- Diagonale AC -->
  <line x1="50" y1="100" x2="430" y2="340" stroke="orange" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Angles droits -->
  <rect x="50" y="100" width="10" height="10" fill="none" stroke="black" stroke-width="1"/>
  <rect x="420" y="100" width="10" height="10" fill="none" stroke="black" stroke-width="1"/>

  <!-- Points -->
  <circle cx="50" cy="100" r="4" fill="black"/>
  <circle cx="430" cy="100" r="4" fill="black"/>
  <circle cx="430" cy="340" r="4" fill="black"/>
  <circle cx="50" cy="340" r="4" fill="black"/>

  <!-- Labels -->
  <text x="35" y="95" font-size="16" font-weight="bold">A</text>
  <text x="440" y="95" font-size="16" font-weight="bold">B</text>
  <text x="440" y="360" font-size="16" font-weight="bold">C</text>
  <text x="35" y="360" font-size="16" font-weight="bold">D</text>
  <text x="190" y="90" font-size="14" font-weight="bold" fill="red">E</text>
  <text x="440" y="292" font-size="14" font-weight="bold" fill="blue">F</text>

  <!-- Dimensions -->
  <text x="220" y="85" font-size="12" fill="blue">AB = 96 mm</text>
  <text x="450" y="220" font-size="12" fill="blue">BC = 72 mm</text>
  <text x="100" y="85" font-size="12" fill="red">AE = 36 mm</text>
  <text x="450" y="315" font-size="12" fill="blue">FC = 48 mm</text>
  <text x="240" y="240" font-size="12" fill="orange">AC = ?</text>
  <text x="300" y="210" font-size="12" fill="green">EC = ?</text>
  <text x="300" y="180" font-size="12" fill="purple">EF = 60 mm</text>
</svg>