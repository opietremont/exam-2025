<svg width="550" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Graphique du parcours du cycliste -->

  <!-- Titre -->
  <text x="150" y="30" font-size="18" font-weight="bold" fill="black">Parcours du cycliste</text>

  <!-- Axes -->
  <!-- Axe horizontal (temps) -->
  <line x1="50" y1="280" x2="520" y2="280" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
  </defs>
  <text x="490" y="300" font-size="14" font-weight="bold">Temps (min)</text>

  <!-- Axe vertical (distance) -->
  <line x1="50" y1="280" x2="50" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="10" y="70" font-size="14" font-weight="bold">Distance (km)</text>

  <!-- Graduations sur l'axe du temps -->
  <line x1="50" y1="280" x2="50" y2="285" stroke="black" stroke-width="1"/>
  <text x="43" y="300" font-size="12">0</text>

  <line x1="250" y1="280" x2="250" y2="285" stroke="black" stroke-width="1"/>
  <text x="235" y="300" font-size="12">39 min</text>

  <line x1="470" y1="280" x2="470" y2="285" stroke="black" stroke-width="1"/>
  <text x="455" y="300" font-size="12">65 min</text>

  <!-- Graduations sur l'axe des distances -->
  <line x1="45" y1="280" x2="50" y2="280" stroke="black" stroke-width="1"/>
  <text x="25" y="285" font-size="12">0</text>

  <line x1="45" y1="147" x2="50" y2="147" stroke="black" stroke-width="1"/>
  <text x="20" y="152" font-size="12">26 km</text>

  <line x1="45" y1="80" x2="50" y2="80" stroke="black" stroke-width="1"/>
  <text x="20" y="85" font-size="12">39 km</text>

  <!-- Parcours du cycliste -->
  <!-- Segment 1 : 0 à 39 min, 0 à 26 km -->
  <line x1="50" y1="280" x2="250" y2="147" stroke="blue" stroke-width="3"/>
  <circle cx="50" cy="280" r="5" fill="blue"/>
  <circle cx="250" cy="147" r="5" fill="blue"/>

  <!-- Segment 2 : 39 à 65 min, 26 à 39 km -->
  <line x1="250" y1="147" x2="470" y2="80" stroke="red" stroke-width="3"/>
  <circle cx="470" cy="80" r="5" fill="red"/>

  <!-- Annotations -->
  <text x="120" y="200" font-size="13" fill="blue" font-weight="bold">26 km en 39 min</text>
  <text x="320" y="100" font-size="13" fill="red" font-weight="bold">13 km en 26 min</text>

  <!-- Légende -->
  <rect x="50" y="310" width="20" height="10" fill="blue"/>
  <text x="75" y="320" font-size="12">Première partie (vitesse constante)</text>

  <rect x="300" y="310" width="20" height="10" fill="red"/>
  <text x="325" y="320" font-size="12">Deuxième partie (vitesse constante)</text>
</svg>
