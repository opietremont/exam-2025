<svg width="600" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle DEF original -->
  <line x1="50" y1="200" x2="115" y2="200" stroke="black" stroke-width="2"/>
  <line x1="50" y1="200" x2="102" y2="122" stroke="black" stroke-width="2"/>
  <line x1="115" y1="200" x2="102" y2="122" stroke="black" stroke-width="2"/>

  <!-- Triangle D'E'F' après symétrie axiale -->
  <line x1="180" y1="200" x2="245" y2="200" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="180" y1="200" x2="232" y2="122" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="245" y1="200" x2="232" y2="122" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Axe de symétrie (d) -->
  <line x1="147" y1="50" x2="147" y2="250" stroke="blue" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Triangle D''E''F'' après rotation de 60° autour de E -->
  <g transform="translate(350, 200)">
    <!-- E reste fixe, rotation de D et F -->
    <line x1="0" y1="0" x2="32.5" y2="-56.3" stroke="purple" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="0" y1="0" x2="65" y2="0" stroke="purple" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="32.5" y1="-56.3" x2="65" y2="0" stroke="purple" stroke-width="2" stroke-dasharray="3,2"/>

    <!-- Arc pour montrer l'angle de rotation -->
    <path d="M 40 0 A 40 40 0 0 1 20 -34.64" fill="none" stroke="purple" stroke-width="1.5"/>
    <text x="35" y="-15" font-size="11" fill="purple">60°</text>

    <!-- Points -->
    <circle cx="0" cy="0" r="4" fill="black"/>
    <circle cx="65" cy="0" r="3" fill="purple"/>
    <circle cx="32.5" cy="-56.3" r="3" fill="purple"/>

    <!-- Labels rotation -->
    <text x="-5" y="20" font-size="14" font-weight="bold">E</text>
    <text x="70" y="5" font-size="13">F</text>
    <text x="38" y="-60" font-size="13" fill="purple">F''</text>
    <text x="-30" y="-30" font-size="13" fill="purple">D''</text>
    <circle cx="-30" cy="-35" r="3" fill="purple"/>
  </g>

  <!-- Points triangle DEF -->
  <circle cx="50" cy="200" r="4" fill="black"/>
  <circle cx="115" cy="200" r="4" fill="black"/>
  <circle cx="102" cy="122" r="4" fill="black"/>

  <!-- Points triangle D'E'F' -->
  <circle cx="180" cy="200" r="3" fill="red"/>
  <circle cx="245" cy="200" r="3" fill="red"/>
  <circle cx="232" cy="122" r="3" fill="red"/>

  <!-- Labels DEF -->
  <text x="35" y="195" font-size="15" font-weight="bold">D</text>
  <text x="120" y="195" font-size="15" font-weight="bold">E</text>
  <text x="107" y="115" font-size="15" font-weight="bold">F</text>

  <!-- Labels D'E'F' -->
  <text x="165" y="195" font-size="14" font-weight="bold" fill="red">D'</text>
  <text x="250" y="195" font-size="14" font-weight="bold" fill="red">E'</text>
  <text x="237" y="115" font-size="14" font-weight="bold" fill="red">F'</text>

  <!-- Axe label -->
  <text x="130" y="40" font-size="13" fill="blue">(d)</text>

  <!-- Dimensions DEF -->
  <text x="70" y="215" font-size="11" fill="black">DE = 6,5 cm</text>
  <text x="110" y="165" font-size="11" fill="black">EF = 7,8 cm</text>
  <text x="60" y="165" font-size="11" fill="black">DF = 5,2 cm</text>

  <!-- Legend -->
  <text x="50" y="280" font-size="12" fill="black">Triangle DEF (noir)</text>
  <text x="50" y="300" font-size="12" fill="red">Triangle D'E'F' - Symétrie axe (d) (rouge)</text>
  <text x="50" y="320" font-size="12" fill="purple">Triangle D''E''F'' - Rotation 60° centre E (violet)</text>
  <text x="50" y="340" font-size="12" fill="blue">Axe de symétrie (d) (bleu)</text>

  <!-- Notes transformations -->
  <text x="50" y="370" font-size="11" fill="green">Symétrie : conservation des longueurs</text>
  <text x="50" y="390" font-size="11" fill="green">Rotation : ED = ED'', angle DED'' = 60°</text>
</svg>