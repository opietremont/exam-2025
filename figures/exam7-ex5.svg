<svg width="450" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Cylindre surmonté d'un cône -->

  <!-- Cône en haut -->
  <!-- Apex du cône -->
  <circle cx="225" cy="60" r="4" fill="red"/>

  <!-- Base du cône (ellipse) = Base supérieure du cylindre -->
  <ellipse cx="225" cy="242" rx="110" ry="28" fill="lightcoral" fill-opacity="0.3" stroke="red" stroke-width="2.5"/>

  <!-- Côtés du cône -->
  <line x1="225" y1="60" x2="115" y2="242" stroke="red" stroke-width="2.5"/>
  <line x1="225" y1="60" x2="335" y2="242" stroke="red" stroke-width="2.5"/>

  <!-- Cylindre en bas -->
  <!-- Base supérieure du cylindre (partagée avec le cône) -->
  <ellipse cx="225" cy="242" rx="110" ry="28" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Corps du cylindre -->
  <rect x="115" y="242" width="220" height="195" fill="lightblue" fill-opacity="0.2" stroke="none"/>

  <!-- Côtés du cylindre -->
  <line x1="115" y1="242" x2="115" y2="437" stroke="black" stroke-width="2.5"/>
  <line x1="335" y1="242" x2="335" y2="437" stroke="black" stroke-width="2.5"/>

  <!-- Base inférieure du cylindre -->
  <ellipse cx="225" cy="437" rx="110" ry="28" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Dimensions -->
  <!-- Rayon -->
  <line x1="225" y1="437" x2="335" y2="437" stroke="blue" stroke-width="2"/>
  <text x="265" y="455" font-size="14" fill="blue" font-weight="bold">r = 65 mm</text>

  <!-- Hauteur du cylindre -->
  <line x1="350" y1="242" x2="350" y2="437" stroke="darkgreen" stroke-width="2"/>
  <line x1="345" y1="242" x2="355" y2="242" stroke="darkgreen" stroke-width="2"/>
  <line x1="345" y1="437" x2="355" y2="437" stroke="darkgreen" stroke-width="2"/>
  <text x="360" y="350" font-size="14" fill="darkgreen" font-weight="bold">h₁ = 117 mm</text>

  <!-- Hauteur du cône -->
  <line x1="100" y1="60" x2="100" y2="242" stroke="red" stroke-width="2"/>
  <line x1="95" y1="60" x2="105" y2="60" stroke="red" stroke-width="2"/>
  <line x1="95" y1="242" x2="105" y2="242" stroke="red" stroke-width="2"/>
  <text x="30" y="160" font-size="14" fill="red" font-weight="bold">h₂ = 91 mm</text>

  <!-- Labels -->
  <text x="180" y="40" font-size="16" fill="red" font-weight="bold">Cône</text>
  <text x="170" y="360" font-size="16" fill="black" font-weight="bold">Cylindre</text>

  <!-- Notes -->
  <text x="80" y="480" font-size="11" fill="gray">Figure non à l'échelle</text>
  <text x="80" y="495" font-size="11" fill="gray">Solide composé : cylindre surmonté d'un cône</text>
</svg>
