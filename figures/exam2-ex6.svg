<svg width="550" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle ABC original -->
  <line x1="50" y1="150" x2="122" y2="150" stroke="black" stroke-width="2"/>
  <line x1="50" y1="150" x2="104" y2="96" stroke="black" stroke-width="2"/>
  <line x1="122" y1="150" x2="104" y2="96" stroke="black" stroke-width="2"/>

  <!-- Triangle A'B'C' après translation (5cm droite, 3cm bas) -->
  <line x1="150" y1="210" x2="222" y2="210" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="150" y1="210" x2="204" y2="156" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="222" y1="210" x2="204" y2="156" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Vecteur de translation -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="blue" />
    </marker>
  </defs>
  <line x1="50" y1="150" x2="150" y2="210" stroke="blue" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>

  <!-- Parallélogramme ABB'A' -->
  <line x1="50" y1="150" x2="150" y2="210" stroke="green" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="122" y1="150" x2="222" y2="210" stroke="green" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Points -->
  <circle cx="50" cy="150" r="4" fill="black"/>
  <circle cx="122" cy="150" r="4" fill="black"/>
  <circle cx="104" cy="96" r="4" fill="black"/>
  <circle cx="150" cy="210" r="4" fill="red"/>
  <circle cx="222" cy="210" r="4" fill="red"/>
  <circle cx="204" cy="156" r="4" fill="red"/>

  <!-- Labels -->
  <text x="35" y="145" font-size="15" font-weight="bold">A</text>
  <text x="127" y="145" font-size="15" font-weight="bold">B</text>
  <text x="109" y="90" font-size="15" font-weight="bold">C</text>
  <text x="155" y="225" font-size="15" font-weight="bold" fill="red">A'</text>
  <text x="227" y="225" font-size="15" font-weight="bold" fill="red">B'</text>
  <text x="209" y="150" font-size="15" font-weight="bold" fill="red">C'</text>

  <!-- Dimensions triangle ABC -->
  <text x="75" y="165" font-size="11" fill="blue">AB = 7,2 cm</text>
  <text x="60" y="125" font-size="11" fill="blue">AC = 5,4 cm</text>
  <text x="115" y="125" font-size="11" fill="blue">BC = 6 cm</text>

  <!-- Note translation -->
  <text x="85" y="180" font-size="11" fill="blue">5 cm →</text>
  <text x="90" y="195" font-size="11" fill="blue">3 cm ↓</text>

  <!-- Rotation (indication) -->
  <g transform="translate(380, 150)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="purple" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="0" y1="0" x2="60" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="purple" stroke-width="2"/>
    <path d="M 50 0 A 50 50 0 0 1 0 -50" fill="none" stroke="purple" stroke-width="1.5"/>
    <text x="30" y="-25" font-size="12" fill="purple">90°</text>
    <text x="-10" y="25" font-size="13" font-weight="bold">A</text>
    <text x="65" y="5" font-size="13">B</text>
    <text x="5" y="-65" font-size="13" fill="purple">B''</text>
  </g>

  <!-- Legend -->
  <text x="50" y="270" font-size="13" fill="black">Triangle ABC (noir)</text>
  <text x="50" y="290" font-size="13" fill="red">Triangle A'B'C' - Translation (rouge)</text>
  <text x="50" y="310" font-size="13" fill="green">Parallélogramme ABB'A' (vert)</text>
  <text x="50" y="330" font-size="13" fill="purple">Rotation 90° centre A (violet - schéma)</text>
</svg>