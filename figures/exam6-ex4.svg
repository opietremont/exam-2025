<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle QRS rectangle en R -->
  <!-- QR = 144, RS = 108, QS = 180 -->

  <!-- Point Q (en bas à gauche) -->
  <circle cx="60" cy="340" r="5" fill="black"/>
  <text x="40" y="360" font-size="18" font-weight="bold">Q</text>

  <!-- Point R (en bas à droite) -->
  <circle cx="348" cy="340" r="5" fill="black"/>
  <text x="355" y="360" font-size="18" font-weight="bold">R</text>

  <!-- Point S (en haut à droite) -->
  <circle cx="348" cy="124" r="5" fill="black"/>
  <text x="355" y="120" font-size="18" font-weight="bold">S</text>

  <!-- Triangle QRS -->
  <line x1="60" y1="340" x2="348" y2="340" stroke="black" stroke-width="2.5"/>
  <line x1="348" y1="340" x2="348" y2="124" stroke="black" stroke-width="2.5"/>
  <line x1="348" y1="124" x2="60" y2="340" stroke="blue" stroke-width="2.5"/>

  <!-- Angle droit en R -->
  <rect x="336" y="328" width="12" height="12" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Point T sur [QR] tel que RT = 48 -->
  <!-- RT/QR = 48/144 = 1/3 -->
  <!-- T est à 1/3 de R vers Q -->
  <!-- x_T = 348 - (288 * 48/144) = 348 - 96 = 252 -->
  <circle cx="252" cy="340" r="4" fill="red"/>
  <text x="245" y="360" font-size="16" font-weight="bold" fill="red">T</text>

  <!-- Segment ST -->
  <line x1="252" y1="340" x2="348" y2="124" stroke="red" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Dimensions -->
  <text x="190" y="330" font-size="13" fill="black">QR = 144 mm</text>
  <text x="360" y="240" font-size="13" fill="black">RS = 108 mm</text>
  <text x="180" y="215" font-size="13" fill="blue">QS = 180 mm</text>
  <text x="290" y="355" font-size="12" fill="red">RT = 48 mm</text>

  <!-- Note -->
  <text x="60" y="50" font-size="11" fill="gray">Figure non à l'échelle</text>
  <text x="60" y="65" font-size="11" fill="gray">Triangle QRS rectangle en R</text>
</svg>
