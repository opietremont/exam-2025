<svg width="450" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle DEF rectangle en E -->
  <!-- D en haut à gauche, E en bas à gauche, F en bas à droite -->

  <!-- Segment DE (vertical) -->
  <line x1="70" y1="50" x2="70" y2="310" stroke="black" stroke-width="2.5"/>

  <!-- Segment DF (hypoténuse) -->
  <line x1="70" y1="50" x2="280" y2="310" stroke="black" stroke-width="2.5"/>

  <!-- Segment EF (horizontal) -->
  <line x1="70" y1="310" x2="280" y2="310" stroke="black" stroke-width="2.5"/>

  <!-- Point G sur [DE] tel que EG = 26 mm -->
  <!-- EG = 26, DE = 78, donc DG = 52 -->
  <!-- EG/DE = 26/78 = 1/3 -->
  <!-- Position de G : 1/3 du bas vers le haut -->
  <!-- y_G = 310 - (260 * 26/78) = 310 - 86.7 = 223 -->
  <circle cx="70" cy="223" r="4" fill="red"/>

  <!-- Perpendiculaire à (DE) passant par G -->
  <!-- DE est vertical, donc la perpendiculaire est horizontale -->
  <!-- Cette droite coupe [DF] en H -->

  <!-- Calcul de H : -->
  <!-- DF va de (70, 50) à (280, 310) -->
  <!-- Pour y = 223 : on résout x -->
  <!-- Direction DF : (210, 260) -->
  <!-- De D(70, 50) : (x, y) = (70, 50) + t(210, 260) -->
  <!-- 223 = 50 + 260t => t = 173/260 = 0.665 -->
  <!-- x = 70 + 210*0.665 = 70 + 140 = 210 -->
  <circle cx="210" cy="223" r="4" fill="blue"/>

  <!-- Segment GH (perpendiculaire) -->
  <line x1="70" y1="223" x2="210" y2="223" stroke="green" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Angle droit en E -->
  <rect x="70" y="298" width="12" height="12" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Angle droit en G -->
  <rect x="70" y="223" width="12" height="12" fill="none" stroke="green" stroke-width="1.5"/>

  <!-- Points principaux -->
  <circle cx="70" cy="50" r="5" fill="black"/>
  <circle cx="70" cy="310" r="5" fill="black"/>
  <circle cx="280" cy="310" r="5" fill="black"/>

  <!-- Labels des points -->
  <text x="50" y="45" font-size="18" font-weight="bold">D</text>
  <text x="50" y="320" font-size="18" font-weight="bold">E</text>
  <text x="290" y="320" font-size="18" font-weight="bold">F</text>
  <text x="50" y="228" font-size="16" font-weight="bold" fill="red">G</text>
  <text x="220" y="215" font-size="16" font-weight="bold" fill="blue">H</text>

  <!-- Dimensions -->
  <text x="20" y="180" font-size="13" fill="blue">DE = 78 mm</text>
  <text x="150" y="340" font-size="13" fill="blue">EF = ?</text>
  <text x="150" y="150" font-size="13" fill="blue">DF = 130 mm</text>
  <text x="20" y="270" font-size="13" fill="red">EG = 26 mm</text>
  <text x="120" y="210" font-size="12" fill="green">(GH) ⊥ (DE)</text>

  <!-- Note -->
  <text x="300" y="200" font-size="11" fill="gray">Figure non</text>
  <text x="300" y="215" font-size="11" fill="gray">à l'échelle</text>
</svg>
