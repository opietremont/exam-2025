<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Configuration de Thalès : deux droites qui se coupent en M -->
  <!-- Droite 1 : M, A, T alignés -->
  <!-- Droite 2 : M, H, R alignés -->
  <!-- (AH) // (TR) -->

  <!-- Point M (centre de la configuration) -->
  <circle cx="100" cy="200" r="5" fill="black"/>

  <!-- Première droite : MAT (vers la droite et légèrement en haut) -->
  <line x1="100" y1="200" x2="380" y2="140" stroke="black" stroke-width="2"/>

  <!-- Deuxième droite : MHR (vers la droite et en bas) -->
  <line x1="100" y1="200" x2="380" y2="320" stroke="black" stroke-width="2"/>

  <!-- Point A sur la droite MAT (MA = 42) -->
  <circle cx="200" cy="180" r="4" fill="red"/>

  <!-- Point T sur la droite MAT (MT = 63) -->
  <circle cx="280" cy="165" r="4" fill="red"/>

  <!-- Point H sur la droite MHR (MH = 56) -->
  <circle cx="220" cy="260" r="4" fill="blue"/>

  <!-- Point R sur la droite MHR (MR = 84) -->
  <circle cx="310" cy="300" r="4" fill="blue"/>

  <!-- Segment AH -->
  <line x1="200" y1="180" x2="220" y2="260" stroke="green" stroke-width="2.5"/>

  <!-- Segment TR (parallèle à AH) -->
  <line x1="280" y1="165" x2="310" y2="300" stroke="purple" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Labels des points -->
  <text x="85" y="195" font-size="18" font-weight="bold">M</text>
  <text x="205" y="170" font-size="16" font-weight="bold" fill="red">A</text>
  <text x="285" y="155" font-size="16" font-weight="bold" fill="red">T</text>
  <text x="210" y="280" font-size="16" font-weight="bold" fill="blue">H</text>
  <text x="320" y="310" font-size="16" font-weight="bold" fill="blue">R</text>

  <!-- Dimensions sur la droite MAT -->
  <text x="140" y="175" font-size="13" fill="red">MA = 42 mm</text>
  <text x="235" y="160" font-size="13" fill="red">AT = 21 mm</text>
  <text x="180" y="150" font-size="12" fill="gray">(MT = 63 mm)</text>

  <!-- Dimensions sur la droite MHR -->
  <text x="150" y="245" font-size="13" fill="blue">MH = 56 mm</text>
  <text x="260" y="295" font-size="13" fill="blue">HR = 28 mm</text>
  <text x="190" y="270" font-size="12" fill="gray">(MR = 84 mm)</text>

  <!-- Note sur le parallélisme -->
  <text x="235" y="235" font-size="14" fill="green" font-weight="bold">(AH) // (TR)</text>

  <!-- Note : figure non à l'échelle -->
  <text x="150" y="370" font-size="13" fill="gray" font-style="italic">Figure non à l'échelle</text>
</svg>