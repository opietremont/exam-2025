<svg width="450" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Cylindre avec cône à l'intérieur -->

  <!-- Cylindre -->
  <!-- Base supérieure (ellipse) -->
  <ellipse cx="225" cy="80" rx="120" ry="30" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Corps du cylindre -->
  <rect x="105" y="80" width="240" height="240" fill="lightblue" fill-opacity="0.2" stroke="none"/>

  <!-- Côtés du cylindre -->
  <line x1="105" y1="80" x2="105" y2="320" stroke="black" stroke-width="2.5"/>
  <line x1="345" y1="80" x2="345" y2="320" stroke="black" stroke-width="2.5"/>

  <!-- Base inférieure (ellipse) -->
  <ellipse cx="225" cy="320" rx="120" ry="30" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Cône à l'intérieur -->
  <!-- Apex du cône au centre de la base supérieure -->
  <line x1="225" y1="80" x2="105" y2="320" stroke="red" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="225" y1="80" x2="345" y2="320" stroke="red" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Base du cône (même que base du cylindre) -->
  <ellipse cx="225" cy="320" rx="120" ry="30" fill="none" stroke="red" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Point au sommet du cône -->
  <circle cx="225" cy="80" r="4" fill="red"/>

  <!-- Dimensions -->
  <!-- Rayon -->
  <line x1="225" y1="320" x2="345" y2="320" stroke="blue" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="blue"/>
    </marker>
  </defs>
  <text x="270" y="340" font-size="14" fill="blue" font-weight="bold">r = 42 mm</text>

  <!-- Hauteur -->
  <line x1="360" y1="80" x2="360" y2="320" stroke="darkgreen" stroke-width="1.5"/>
  <line x1="355" y1="80" x2="365" y2="80" stroke="darkgreen" stroke-width="1.5"/>
  <line x1="355" y1="320" x2="365" y2="320" stroke="darkgreen" stroke-width="1.5"/>
  <text x="370" y="210" font-size="14" fill="darkgreen" font-weight="bold">h = 91 mm</text>

  <!-- Labels -->
  <text x="180" y="50" font-size="16" fill="black" font-weight="bold">Cylindre</text>
  <text x="250" y="100" font-size="14" fill="red" font-weight="bold">Cône</text>

  <!-- Notes -->
  <text x="80" y="380" font-size="11" fill="gray">Figure non à l'échelle</text>
  <text x="80" y="395" font-size="11" fill="gray">Le cône (rouge) est inscrit dans le cylindre (bleu)</text>
  <text x="80" y="410" font-size="11" fill="gray">Même base et même hauteur</text>
</svg>
