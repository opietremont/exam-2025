<svg width="550" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle ABC avec transformations -->

  <!-- Triangle ABC original -->
  <circle cx="100" cy="250" r="4" fill="black"/>
  <text x="80" y="270" font-size="16" font-weight="bold">A</text>

  <circle cx="228" cy="250" r="4" fill="black"/>
  <text x="235" y="270" font-size="16" font-weight="bold">B</text>

  <circle cx="228" cy="94" r="4" fill="black"/>
  <text x="235" y="90" font-size="16" font-weight="bold">C</text>

  <!-- Triangle ABC -->
  <polygon points="100,250 228,250 228,94" fill="lightblue" fill-opacity="0.3" stroke="black" stroke-width="2.5"/>

  <!-- Dimensions du triangle -->
  <text x="150" y="270" font-size="12" fill="black">AB = 6,4 cm</text>
  <text x="240" y="180" font-size="12" fill="black">BC = 7,8 cm</text>
  <text x="140" y="160" font-size="12" fill="black">AC = 5,2 cm</text>

  <!-- Rotation de 90° autour de B -->
  <!-- A' est obtenu par rotation de A autour de B, 90° horaire -->
  <!-- BA = 128 pixels horizontalement, donc A' sera 128 pixels vers le bas de B -->
  <circle cx="228" cy="378" r="4" fill="red"/>
  <text x="235" y="395" font-size="16" font-weight="bold" fill="red">A'</text>

  <!-- C' est obtenu par rotation de C autour de B, 90° horaire -->
  <!-- BC = 156 pixels verticalement, donc C' sera 156 pixels à droite de B -->
  <circle cx="384" cy="250" r="4" fill="red"/>
  <text x="391" y="255" font-size="16" font-weight="bold" fill="red">C'</text>

  <!-- Triangle A'BC' -->
  <polygon points="228,378 228,250 384,250" fill="lightcoral" fill-opacity="0.3" stroke="red" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Arc pour montrer l'angle de rotation -->
  <path d="M 164 250 A 64 64 0 0 1 228 314" fill="none" stroke="red" stroke-width="1.5"/>
  <text x="180" y="300" font-size="11" fill="red">90°</text>

  <!-- Symétrie axiale d'axe (BC) -->
  <!-- A'' est le symétrique de A par rapport à (BC) qui est vertical -->
  <!-- A est à 128 pixels à gauche de B, donc A'' sera à 128 pixels à droite de B -->
  <circle cx="356" cy="250" r="4" fill="blue"/>
  <text x="363" y="270" font-size="16" font-weight="bold" fill="blue">A''</text>

  <!-- Quadrilatère ABA''C (cerf-volant) -->
  <polygon points="100,250 228,250 356,250 228,94" fill="lightgreen" fill-opacity="0.2" stroke="blue" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Axe de symétrie (BC) -->
  <line x1="228" y1="40" x2="228" y2="300" stroke="blue" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="235" y="50" font-size="12" fill="blue">Axe (BC)</text>

  <!-- Flèches pour les transformations -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="red"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="blue"/>
    </marker>
  </defs>

  <!-- Note -->
  <text x="400" y="320" font-size="11" fill="gray">Figure non à l'échelle</text>
  <text x="400" y="335" font-size="11" fill="gray">Triangle bleu: ABC</text>
  <text x="400" y="350" font-size="11" fill="gray">Triangle rouge: A'BC'</text>
  <text x="400" y="365" font-size="11" fill="gray">(rotation 90°)</text>
  <text x="400" y="380" font-size="11" fill="gray">Point bleu: A''</text>
  <text x="400" y="395" font-size="11" fill="gray">(symétrie axe BC)</text>
</svg>
