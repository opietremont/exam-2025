<svg width="500" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangle ABCD avec points E et F -->

  <!-- Rectangle ABCD : AB = 120, BC = 90 -->
  <!-- A en bas à gauche, B en bas à droite, C en haut à droite, D en haut à gauche -->

  <!-- Point A -->
  <circle cx="60" cy="280" r="4" fill="black"/>
  <text x="40" y="300" font-size="16" font-weight="bold">A</text>

  <!-- Point B -->
  <circle cx="300" cy="280" r="4" fill="black"/>
  <text x="305" y="300" font-size="16" font-weight="bold">B</text>

  <!-- Point C -->
  <circle cx="300" cy="100" r="4" fill="black"/>
  <text x="305" y="95" font-size="16" font-weight="bold">C</text>

  <!-- Point D -->
  <circle cx="60" cy="100" r="4" fill="black"/>
  <text x="40" y="95" font-size="16" font-weight="bold">D</text>

  <!-- Rectangle ABCD -->
  <rect x="60" y="100" width="240" height="180" fill="lightblue" fill-opacity="0.2" stroke="black" stroke-width="2.5"/>

  <!-- Point E sur [AB] avec AE = 48 -->
  <!-- AE/AB = 48/120 = 2/5 -->
  <!-- x_E = 60 + (240 * 48/120) = 60 + 96 = 156 -->
  <circle cx="156" cy="280" r="4" fill="red"/>
  <text x="150" y="300" font-size="16" font-weight="bold" fill="red">E</text>

  <!-- Point F sur [CD] avec DF = 36 -->
  <!-- DF/DC = 36/120 = 3/10 -->
  <!-- x_F = 60 + (240 * 36/120) = 60 + 72 = 132 -->
  <circle cx="132" cy="100" r="4" fill="blue"/>
  <text x="125" y="90" font-size="16" font-weight="bold" fill="blue">F</text>

  <!-- Diagonale AC -->
  <line x1="60" y1="280" x2="300" y2="100" stroke="purple" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Segment EF -->
  <line x1="156" y1="280" x2="132" y2="100" stroke="green" stroke-width="2.5"/>

  <!-- Droites (BF) et (CE) se coupant en G -->
  <line x1="300" y1="280" x2="132" y2="100" stroke="orange" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="300" y1="100" x2="156" y2="280" stroke="orange" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Point G (approximatif) -->
  <circle cx="210" cy="195" r="4" fill="orange"/>
  <text x="215" y="190" font-size="16" font-weight="bold" fill="orange">G</text>

  <!-- Dimensions -->
  <text x="160" y="300" font-size="12" fill="black">AB = 120 mm</text>
  <text x="310" y="200" font-size="12" fill="black">BC = 90 mm</text>
  <text x="100" y="295" font-size="11" fill="red">AE = 48 mm</text>
  <text x="80" y="85" font-size="11" fill="blue">DF = 36 mm</text>
  <text x="150" y="230" font-size="11" fill="purple">AC = ?</text>

  <!-- Angles droits -->
  <rect x="60" y="268" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="288" y="268" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="288" y="100" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>
  <rect x="60" y="100" width="12" height="12" fill="none" stroke="black" stroke-width="1"/>

  <!-- Note -->
  <text x="350" y="300" font-size="10" fill="gray">Figure non</text>
  <text x="350" y="315" font-size="10" fill="gray">à l'échelle</text>
</svg>
